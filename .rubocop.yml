plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "pkg/**/*"

Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"

RSpec/MultipleExpectations:
  Max: 5

RSpec/ExampleLength:
  Max: 15

RSpec/ContextWording:
  Prefixes:
    - when
    - with
    - without
    - for

RSpec/DescribeClass:
  Exclude:
    - "spec/safety/**/*"

Style/OneClassPerFile:
  Exclude:
    - "spec/support/**/*"
